<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240" role="img" aria-labelledby="f1Title">
  <title id="f1Title">CPU emulator — registers and program counter</title>
  <defs>
    <linearGradient id="f1bg" x1="0" x2="1"><stop offset="0" stop-color="#e8f4fc"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="url(#f1bg)" stroke="#cfe8f8"/>
  <!-- PC -->
  <rect x="20" y="22" width="72" height="44" rx="6" fill="#0b4f6c"/>
  <text x="56" y="50" text-anchor="middle" fill="#fff" font-family="Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700">PC → 3</text>
  <!-- Registers -->
  <g font-family="Segoe UI, Roboto, sans-serif">
    <rect x="108" y="22" width="76" height="44" rx="6" fill="#fff" stroke="#0b4f6c" stroke-width="2"/>
    <text x="146" y="42" text-anchor="middle" fill="#333" font-size="10" font-weight="600">R0</text>
    <text x="146" y="58" text-anchor="middle" fill="#0b4f6c" font-size="14" font-weight="700">3</text>
    <rect x="196" y="22" width="76" height="44" rx="6" fill="#fff" stroke="#0b4f6c" stroke-width="2"/>
    <text x="234" y="42" text-anchor="middle" fill="#333" font-size="10" font-weight="600">R1</text>
    <text x="234" y="58" text-anchor="middle" fill="#0b4f6c" font-size="14" font-weight="700">5</text>
    <rect x="284" y="22" width="76" height="44" rx="6" fill="#fff" stroke="#0b4f6c" stroke-width="2"/>
    <text x="322" y="42" text-anchor="middle" fill="#333" font-size="10" font-weight="600">R2</text>
    <text x="322" y="58" text-anchor="middle" fill="#999" font-size="14" font-weight="700">0</text>
  </g>
  <!-- Arrows -->
  <path d="M92 44 H104" stroke="#ff7a59" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#ff7a59"/></marker></defs>
  <!-- Memory strip -->
  <text x="20" y="100" fill="#555" font-family="Segoe UI, Roboto, sans-serif" font-size="11" font-weight="600">Memory</text>
  <g transform="translate(20 108)">
    <rect width="52" height="36" fill="#fff" stroke="#ccc" rx="4"/><text x="26" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#333">03</text>
    <rect x="58" width="52" height="36" fill="#fff" stroke="#ccc" rx="4"/><text x="84" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#333">05</text>
    <rect x="116" width="52" height="36" fill="#e8f7ff" stroke="#0b4f6c" rx="4"/><text x="142" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#0b4f6c" font-weight="700">08</text>
  </g>
  <text x="20" y="188" fill="#0b4f6c" font-family="Segoe UI, Roboto, sans-serif" font-size="15" font-weight="700">CPU Emulator</text>
  <text x="20" y="212" fill="#555" font-family="Segoe UI, Roboto, sans-serif" font-size="12">Step-through execution, registers, and memory view</text>
</svg>
