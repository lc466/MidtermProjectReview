<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" role="img" aria-labelledby="vmTitle">
  <title id="vmTitle">Online museum open around the clock</title>
  <defs>
    <linearGradient id="vmSky" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#dceeff"/><stop offset="1" stop-color="#f7fbff"/></linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="10" fill="url(#vmSky)" stroke="#b8d4ee"/>
  <!-- Simple building -->
  <rect x="220" y="70" width="200" height="100" fill="#e8eef5" stroke="#8aa0b8" stroke-width="2"/>
  <polygon points="210,70 320,30 430,70" fill="#c5d4e8" stroke="#8aa0b8" stroke-width="2"/>
  <rect x="250" y="100" width="36" height="50" fill="#6b8caf" rx="2"/>
  <rect x="310" y="100" width="36" height="50" fill="#6b8caf" rx="2"/>
  <rect x="370" y="100" width="36" height="50" fill="#6b8caf" rx="2"/>
  <!-- Clock 24/7 -->
  <circle cx="520" cy="100" r="42" fill="#fff" stroke="#0b4f6c" stroke-width="3"/>
  <line x1="520" y1="100" x2="520" y2="72" stroke="#0b4f6c" stroke-width="3" stroke-linecap="round"/>
  <line x1="520" y1="100" x2="540" y2="100" stroke="#0b4f6c" stroke-width="2" stroke-linecap="round"/>
  <text x="520" y="155" text-anchor="middle" fill="#0b4f6c" font-family="Segoe UI, Roboto, sans-serif" font-size="11" font-weight="700">24/7 online</text>
  <text x="320" y="192" text-anchor="middle" fill="#555" font-family="Segoe UI, Roboto, sans-serif" font-size="12">Plan your visit  exhibits available anytime in your browser</text>
</svg>
