<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Museum exhibit banner — computing history and hands-on demos</title>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#062a3d"/>
      <stop offset="0.5" stop-color="#0b4f6c"/>
      <stop offset="1" stop-color="#1a7a9e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2d3e50"/>
      <stop offset="1" stop-color="#1a252f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#heroBg)" rx="10"/>
  <!-- Decorative grid -->
  <g opacity="0.08" stroke="#fff" stroke-width="1" fill="none">
    <path d="M0 80 H1600 M0 160 H1600 M0 240 H1600 M0 320 H1600"/>
    <path d="M200 0 V400 M400 0 V400 M600 0 V400 M800 0 V400 M1000 0 V400 M1200 0 V400 M1400 0 V400"/>
  </g>
  <!-- Punch card silhouette -->
  <g transform="translate(1180 40)" opacity="0.25">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#fff"/>
    <g fill="#0b4f6c">
      <circle cx="35" cy="35" r="8"/><circle cx="70" cy="35" r="8"/><circle cx="105" cy="35" r="8"/>
      <circle cx="35" cy="70" r="8"/><circle cx="70" cy="70" r="8"/>
      <circle cx="35" cy="105" r="8"/><circle cx="105" cy="105" r="8"/>
    </g>
  </g>
  <!-- CPU chip -->
  <g transform="translate(1320 180)" filter="url(#glow)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="url(#chip)"/>
    <rect x="24" y="24" width="152" height="92" rx="4" fill="#0d2137" stroke="#4a90c8" stroke-width="2"/>
    <text x="100" y="78" text-anchor="middle" fill="#8ec8ff" font-family="Segoe UI, Roboto, system-ui, sans-serif" font-size="14" font-weight="600">CPU</text>
    <!-- pins -->
    <g stroke="#6fb3ff" stroke-width="3">
      <line x1="0" y1="40" x2="-12" y2="40"/><line x1="0" y1="60" x2="-12" y2="60"/>
      <line x1="200" y1="40" x2="212" y2="40"/><line x1="200" y1="60" x2="212" y2="60"/>
    </g>
  </g>
  <!-- Title -->
  <g fill="#fff" font-family="Segoe UI, Roboto, system-ui, sans-serif">
    <text x="56" y="118" font-size="38" font-weight="700">Museum — The Evolution of Computing</text>
    <text x="56" y="168" font-size="19" opacity="0.92">Hands-on demos: emulators, punch cards, and circuit sandboxes</text>
  </g>
  <!-- Binary stream decoration -->
  <text x="56" y="300" fill="#7ec8e8" font-family="ui-monospace, Consolas, monospace" font-size="13" opacity="0.5">01001000 01101001 01110011 01110100 01101111 01110010 01111001</text>
</svg>
